- title: Best CSV-breaker 
  key: score
  # hidden: false
  submission_rule: "Force_Best"
  columns:
  - title: correct rows
    key: percentage_rows_easy
    index: 0
    precision: 3
    sorting: desc
  - title: correct names
    key: percentage_names_easy
    index: 1
    precision: 3
    sorting: desc
    hidden: false  
  - title: correct dates
    key: percentage_dates_easy
    index: 2
    precision: 3
    sorting: desc
    hidden: false
  - title: correct address
    key: percentage_address_easy
    index: 3
    precision: 3
    sorting: desc
    hidden: false
  - title: ignored files
    key: percentage_files_missed_easy
    index: 4
    precision: 3
    sorting: asc
    hidden: false
  - title: Total time.
    key: time_easy
    index: 5
    precision: 5
    sorting: asc
    hidden: false
